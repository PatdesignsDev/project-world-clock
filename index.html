<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="stylesheet" href="css/style.css" />
    <script src="https://cdnjs.cloudflare.com/ajax/libs/moment.js/2.30.1/moment.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/moment-timezone/0.6.0/moment-timezone-with-data-1970-2030.min.js"></script>
    <title>World Clock - Patdesigns</title>
  </head>
  <body>
    <div class="container">
      <h1>
          World Clock 🕒
      </h1>

      <select id="city">
        <option value="">Select a city...</option>
        <option value="current">My current location</option>
        <option value="America/New_York">New York</option>
        <option value="Pacific/Auckland">Auckland</option>
        <option value="Asia/Toyko">Tokyo</option>
        <option value="Europe/Luxembourg">Luxembourg</option>
        <option value="Europe/Lisbon">Lisbon</option>
      </select>

      <div id="cities">
        <div class="city" id="lisbon">
          <div>
            <h2>Lisbon 🇵🇹</h2>
            <div class="date"></div>
          </div>
          <div class="time"></div>
        </div>
        <div class="city" id="luxembourg">
          <div>
            <h2>Luxembourg 🇱🇺</h2>
            <div class="date"></div>
          </div>
          <div class="time"></div>
        </div>
      </div>
    </div>
    <footer>
      This project was Coded ❤️ by Patrícia Moutinho and is
      <a
        href="https://github.com/PatdesignsDev/project-world-clock"
        target="_blank"
        >open sourced on GitHub</a
      >
    </footer>

    <script src="javascript/index.js"></script>
  </body>
</html>
